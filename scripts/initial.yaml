data:
  train_files: None
  val_files: None
  prompt_key: text
  max_prompt_length: 1400
  max_response_length: 2000
  rollout_batch_size: 16
  shuffle: true
  seed: 42
  max_pixels: 705600
  min_pixels: 3136

algorithm:
  adv_estimator: grpo
  kl_coef: 0.0

worker:
  actor:
    global_batch_size: 64
    micro_batch_size_per_device_for_update: 16
    micro_batch_size_per_device_for_experience: 16
    max_grad_norm: 1.0
    entropy_coef: 0.0
    use_kl_loss: true
    kl_loss_coef: 5.0e-3
    kl_loss_type: low_var_kl
    model:
      model_path: Qwen/Qwen2.5-VL-7B-Instruct
      enable_gradient_checkpointing: true
    optim:
      base_lr: 1.0e-6
      weight_decay: 1.0e-2
      lr_qb_rate: 30
      lr_head_rate: 25
      lr_pe_rate: 10
      lr_decoder_rate: 5
      lr_final_div_factor: 6.7
    fsdp:
      param_offload: false
      optimizer_offload: false
      torch_dtype: null
    offload:
      param_offload: false
      optimizer_offload: false

  rollout:
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.5
    n: 4

  ref:
    offload:
      param_offload: false

  sae:
    architecture: standard
    d_in: 4096
    d_sae: 65536
    activation_fn_str: relu
    activation_fn_kwargs: {}
    apply_b_dec_to_input: false
    finetuning_scaling_factor: false
    normalize_activations: none
    dtype: bfloat16
    device: cpu

    # Meta Info as log, no practival use
    model_name: llava-1.5-7b
    hook_name: blocks.16.hook_resid_post
    hook_layer: 16

    # USELESS！ placeholder for consistency
    hook_head_index: null
    context_size: 4096
    prepend_bos: false
    dataset_path: null
    dataset_trust_remote_code: false
    sae_lens_training_version: null
    model_from_pretrained_kwargs: {}

  reward:
    reward_type: function
    compute_score: scots

trainer:
  total_episodes: 1
  logger: []
  # or ["console", "wandb"]
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 100
  test_freq: 10000
  val_before_train: false
  val_only: false